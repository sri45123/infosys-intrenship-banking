server.port=8080

spring.datasource.url=${BANK_DB_URL:jdbc:mysql://localhost:3306/bank?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${BANK_DB_USERNAME:root}
spring.datasource.password=${BANK_DB_PASSWORD:yourpassword}
spring.datasource.driver-class-name=${BANK_DB_DRIVER:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

bank.jwt.secret=${BANK_JWT_SECRET:banking-app-secret-key-change-me-please-2026-secret-key}
bank.jwt.expiration-ms=${BANK_JWT_EXPIRATION_MS:86400000}